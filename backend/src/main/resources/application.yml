spring:
  application:
    name: chatapp
  datasource:
    url: jdbc:postgresql://localhost:5432/chatapp_dev
    username: chatapp
    password: chatapp
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

app:
  jwt:
    secret: local-dev-secret-do-not-use-in-production-must-be-at-least-32-chars
  stomp:
    relay-host: localhost
    relay-port: 61613
    login: guest
    passcode: guest
  uploads:
    path: /tmp/chatapp-uploads
  mail:
    from: noreply@chatapp.local
  frontend:
    url: http://localhost:3000

server:
  port: 8080
